name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24" # tests run .ts directly via Node's native type stripping
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
